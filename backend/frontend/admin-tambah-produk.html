<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tambah Produk</title>

<!-- Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet"
href="css/admin.css">

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h3>

<i class="bi bi-box-seam-fill"></i>

InkLab

</h3>

<a href="admin-dashboard.html">

<i class="bi bi-speedometer2"></i>

Dashboard

</a>

<a href="admin-produk.html" class="active">

<i class="bi bi-box-fill"></i>

Produk

</a>

<a href="admin-order.html">

<i class="bi bi-cart-fill"></i>

Order

</a>

<a href="admin-user.html">

<i class="bi bi-people-fill"></i>

User

</a>

<a href="#" id="logoutBtn">

<i class="bi bi-box-arrow-right"></i>

Logout

</a>

</div>

<!-- Content -->

<div class="content">

<div class="topbar">

<h4 class="mb-0">

Tambah Produk

</h4>

<div>

<i class="bi bi-person-circle"></i>

Administrator

</div>

</div>

<div class="card-box">

<h2 class="mb-4">

Form Tambah Produk

</h2>

<form
id="formProduk"
enctype="multipart/form-data">

<div class="mb-3">

<label class="form-label">

Nama Produk

</label>

<input
type="text"
id="product_name"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">

Harga

</label>

<input
type="number"
id="price"
class="form-control"
required>

</div>

<div class="mb-3">

    <label class="form-label">
    Stock
    </label>
    
    <input
    type="number"
    id="stock"
    class="form-control"
    required>
    
    </div>

<div class="mb-3">

<label class="form-label">

Deskripsi

</label>

<textarea
id="description"
rows="5"
class="form-control"></textarea>

</div>

<div class="mb-3">

<label class="form-label">

Kategori

</label>

<select
id="category_id"
class="form-select">

</select>

</div>

<div class="mb-4">

<label class="form-label">

Foto Produk

</label>

<input
type="file"
id="image"
class="form-control">

</div>

<button
type="submit"
class="btn btn-primary">

<i class="bi bi-floppy"></i>

Simpan Produk

</button>

<a
href="admin-produk.html"
class="btn btn-secondary">

Batal

</a>

</form>

</div>

</div>

<script src="js/admin-tambah-produk.js"></script>
<script src="js/admin-auth.js"></script>

</body>
</html>
