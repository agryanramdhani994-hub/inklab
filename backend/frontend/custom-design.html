<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Custom Design - INKLAB</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container py-5">

    <div class="text-center mb-5">

        <h1 class="fw-bold">

            Custom Design

        </h1>

        <p class="text-secondary">

            Upload desain Anda dan kami akan membantu proses produksinya.

        </p>

    </div>

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow p-4 rounded-4">

                <div class="mb-3">

                    <label class="form-label fw-bold">

                        Jenis Produk

                    </label>

                    <select class="form-select">

                        <option>Plakat</option>
                        <option>Medali</option>
                        <option>Neon Box</option>
                        <option>Acrylic</option>
                        <option>Nomor Rumah</option>

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label fw-bold">

                        Nama Lengkap

                    </label>

                    <input
                        type="text"
                        class="form-control"
                        placeholder="Masukkan nama lengkap">

                </div>

                <div class="mb-3">

                    <label class="form-label fw-bold">

                        Nomor WhatsApp

                    </label>

                    <input
                        type="text"
                        class="form-control"
                        placeholder="08xxxxxxxxxx">

                </div>

                <div class="mb-3">

                    <label class="form-label fw-bold">

                        Jumlah Pesanan

                    </label>

                    <input
                        type="number"
                        class="form-control"
                        placeholder="Masukkan jumlah">

                </div>

                <div class="mb-3">

                    <label class="form-label fw-bold">

                        Upload Desain

                    </label>

                    <input
                        type="file"
                        class="form-control">

                </div>

                <div class="mb-4">

                    <label class="form-label fw-bold">

                        Catatan Tambahan

                    </label>

                    <textarea
                        class="form-control"
                        rows="5"
                        placeholder="Tulis permintaan khusus..."></textarea>

                </div>

                <button
                    class="btn btn-success btn-lg w-100"
                    onclick="kirimWA()">

                    <i class="bi bi-whatsapp"></i>

                    Kirim ke WhatsApp

                </button>

            </div>

        </div>

    </div>

</div>

<script>

function kirimWA(){

const nomor="6281234567890";

const pesan=
"Halo INKLAB, saya ingin melakukan custom design.";

window.open(

`https://wa.me/${nomor}?text=${encodeURIComponent(pesan)}`,

"_blank"

);

}

</script>

</body>

</html>
