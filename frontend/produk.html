<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Produk - INKLAB</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <nav class="navbar-custom">
    
        <div class="container-fluid nav-wrapper">
    
            <div class="logo">
                INKLAB
            </div>
    
            <div class="search-area">
    
                <input
                    type="text"
                    id="searchInput"
                    class="search-box"
                    placeholder="Cari produk custom..."
                >
    
            </div>
    
            <div class="nav-menu">
    
                <a href="index.html">
                    <i class="bi bi-house-door"></i>
                    Home
                </a>
    
                <a href="produk.html">
                    <i class="bi bi-grid"></i>
                    Produk
                </a>
    
                <a href="custom-design.html">
                    <i class="bi bi-palette"></i>
                    Custom Design
                </a>
    
                <a href="tentang.html">
                    <i class="bi bi-building"></i>
                    Tentang Kami
                </a>
    
                <a href="kontak.html">
                    <i class="bi bi-envelope"></i>
                    Kontak
                </a>
    
                <a href="wishlist.html" class="wishlist-icon">
    
                    <i class="bi bi-heart"></i>
    
                    <span
                        id="wishlistBadge"
                        class="wishlist-badge">
    
                        0
    
                    </span>
    
                </a>
    
                <a href="cart.html" class="cart-icon">
    
                    <i class="bi bi-cart3"></i>
    
                    <span
                        id="cartBadge"
                        class="cart-badge">
    
                        0
    
                    </span>
    
                </a>
    
                <div id="authMenu">
    
                    <a href="login.html">
                        <i class="bi bi-person-circle"></i>
                        Masuk
                    </a>
    
                    <a
                        href="register.html"
                        class="btn-daftar">
    
                        Daftar
    
                    </a>
    
                </div>
    
            </div>
    
        </div>
    
    </nav>
    
    <div class="container py-5">

    <h1 class="text-center fw-bold mb-5">
        Semua Produk
    </h1>

    <div class="row">

        <!-- SIDEBAR -->

        <div class="col-lg-3 mb-4">

            <div class="card shadow-sm p-4 rounded-4">

                <h4 class="fw-bold">
                    Kategori
                </h4>

                <hr>

                <div class="form-check mb-2">
                    <input
                        class="form-check-input categoryFilter"
                        type="checkbox"
                        value="Plakat">
                
                    <label class="form-check-label">
                        Plakat
                    </label>
                </div>

                <div class="form-check mb-2">
                    <input
                        class="form-check-input categoryFilter"
                        type="checkbox"
                        value="Medali">
                
                    <label class="form-check-label">
                        Medali
                    </label>
                </div>

                <div class="form-check mb-2">
                    <input
                        class="form-check-input categoryFilter"
                        type="checkbox"
                        value="Neon Box">
                
                    <label class="form-check-label">
                        Neon Box
                    </label>
                </div>

                <div class="form-check mb-2">
                    <input
                        class="form-check-input categoryFilter"
                        type="checkbox"
                        value="Acrylic">
                
                    <label class="form-check-label">
                        Acrylic
                    </label>
                </div>

                <div class="form-check mb-2">
                    <input
                        class="form-check-input categoryFilter"
                        type="checkbox"
                        value="Nomor Rumah">
                
                    <label class="form-check-label">
                        Nomor Rumah
                    </label>
                </div>

            </div>

        </div>

        <!-- DAFTAR PRODUK -->

        <div class="col-lg-9">

            <div class="row" id="productContainer">

                <!-- Product akan dibuat otomatis oleh JavaScript -->

            </div>

        </div>

    </div>

</div>

<script src="js/layout.js"></script>

<script src="js/product.js"></script>

</body>

</html>
