<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Produk - INKLAB</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container py-5">

    <h1 class="text-center fw-bold mb-5">
        Semua Produk
    </h1>

    <div class="row">

        <!-- SIDEBAR -->

        <div class="col-lg-3 mb-4">

            <div class="card shadow-sm p-4 rounded-4">

                <h4 class="fw-bold">
                    Kategori
                </h4>

                <hr>

                <div class="form-check mb-2">
                    <input
                        class="form-check-input categoryFilter"
                        type="checkbox"
                        value="Plakat">
                
                    <label class="form-check-label">
                        Plakat
                    </label>
                </div>

                <div class="form-check mb-2">
                    <input
                        class="form-check-input categoryFilter"
                        type="checkbox"
                        value="Medali">
                
                    <label class="form-check-label">
                        Medali
                    </label>
                </div>

                <div class="form-check mb-2">
                    <input
                        class="form-check-input categoryFilter"
                        type="checkbox"
                        value="Neon Box">
                
                    <label class="form-check-label">
                        Neon Box
                    </label>
                </div>

                <div class="form-check mb-2">
                    <input
                        class="form-check-input categoryFilter"
                        type="checkbox"
                        value="Acrylic">
                
                    <label class="form-check-label">
                        Acrylic
                    </label>
                </div>

                <div class="form-check mb-2">
                    <input
                        class="form-check-input categoryFilter"
                        type="checkbox"
                        value="Nomor Rumah">
                
                    <label class="form-check-label">
                        Nomor Rumah
                    </label>
                </div>

            </div>

        </div>

        <!-- DAFTAR PRODUK -->

        <div class="col-lg-9">

            <div class="row" id="productContainer">

                <!-- Product akan dibuat otomatis oleh JavaScript -->

            </div>

        </div>

    </div>

</div>

<script src="js/product.js"></script>

</body>

</html>
