<!DOCTYPE html>
<html lang="id">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Profil Saya - INKLAB</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link 
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- Navbar -->
    <nav class="navbar-custom">
    
        <div class="container-fluid nav-wrapper">
    
            <div class="logo">
                INKLAB
            </div>
    
            <div class="search-area">
    
                <input
                    type="text"
                    id="searchInput"
                    class="search-box"
                    placeholder="Cari produk custom..."
                >
    
            </div>
    
            <div class="nav-menu">
    
                <a href="index.html">
                    <i class="bi bi-house-door"></i>
                    Home
                </a>
    
                <a href="produk.html">
                    <i class="bi bi-grid"></i>
                    Produk
                </a>
    
                <a href="custom-design.html">
                    <i class="bi bi-palette"></i>
                    Custom Design
                </a>
    
                <a href="tentang.html">
                    <i class="bi bi-building"></i>
                    Tentang Kami
                </a>
    
                <a href="kontak.html">
                    <i class="bi bi-envelope"></i>
                    Kontak
                </a>
    
                <a href="#">
                    <i class="bi bi-heart"></i>
                </a>
    
                <a href="cart.html">
                    <i class="bi bi-cart3"></i>
                </a>
    
                <div id="authMenu">
    
                    <a href="login.html">
                        <i class="bi bi-person-circle"></i>
                        Masuk
                    </a>
    
                    <a href="register.html" class="btn-daftar">
                        Daftar
                    </a>
    
                </div>
    
            </div>
    
        </div>
    
    </nav>
    
    <div class="container py-5">

    <h1 class="text-center mb-5">
        Profil Saya
    </h1>

    <div class="row">

        <!-- Data Profil -->

        <div class="col-lg-4">

            <div class="card shadow-sm p-4 text-center">

                <img
                src="https://via.placeholder.com/150"
                class="rounded-circle mx-auto mb-3"
                width="150">

                <h3 id="profileName">
                    Loading...
                </h3>

                <p class="text-muted" id="profileRole">
                    Loading...
                </p>

                <hr>

                <p>
                    <i class="bi bi-envelope"></i>
                    <span id="profileEmail">
                        Loading...
                    </span>
                </p>

                <p>
                    <i class="bi bi-calendar"></i>
                
                    Bergabung :
                
                    <span id="profileDate">
                        Loading...
                    </span>
                </p>

                <p>
                    <i class="bi bi-telephone"></i>
                    <span id="profilePhone"></span>
                </p>

                <p>
                    <i class="bi bi-geo-alt"></i>
                    <span id="profileAddress">
                        -
                    </span>
                </p>

                <button 
                    class="btn btn-primary w-100 mt-3"
                    data-bs-toggle="modal"
                    data-bs-target="#editProfileModal">
                    Edit Profil
                </button>

            </div>

        </div>

        <!-- Riwayat -->

        <div class="col-lg-8">

            <div class="card shadow-sm p-4">

                <h3 class="mb-4">

                    Riwayat Pesanan

                </h3>

                <table class="table">

                    <thead>

                        <tr>

                            <th>Order</th>

                            <th>Status</th>

                            <th>Total</th>

                            <th>Aksi</th>

                        </tr>

                    </thead>

                    <tbody id="orderTable">

                    </tbody>

                </table>

                <button 
                    class="btn btn-danger mt-3 w-100"
                    id="logoutBtn">

                    Logout

                </button>

            </div>

        </div>

    </div>

</div>

<!-- Modal Detail Order -->
<div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">
                    Detail Pesanan
                </h5>

                <button
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>
            </div>

            <div class="modal-body">

                <div class="mb-3">

                    <div class="d-flex justify-content-between">
                
                        <h5 id="detailOrderId">
                            Order #
                        </h5>
                
                        <span
                            class="badge bg-warning"
                            id="detailStatus">
                
                            Pending
                
                        </span>
                
                    </div>
                
                    <small
                        class="text-muted"
                        id="detailInfo">
                
                    </small>
                
                </div>
                
                <hr>
                
                <div id="detailOrder">
                
                </div>
                
                <hr>
                
                <h5 class="text-end">
                
                    Total :
                
                    <span id="detailTotal">
                
                        Rp 0
                
                    </span>
                
                </h5>

            </div>

        </div>
    </div>
</div>

<!-- Modal Edit Profile -->
<div class="modal fade" id="editProfileModal" tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">
                    Edit Profil
                </h5>

                <button
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <input
                    type="text"
                    id="editFullname"
                    class="form-control mb-3"
                    placeholder="Nama Lengkap">

                <input
                    type="text"
                    id="editPhone"
                    class="form-control mb-3"
                    placeholder="Nomor HP">

                <textarea
                    id="editAddress"
                    class="form-control mb-3"
                    rows="3"
                    placeholder="Alamat"></textarea>

                <input
                    type="file"
                    id="editPhoto"
                    class="form-control">

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">
                    Batal
                </button>

                <button
                    class="btn btn-primary"
                    id="saveProfile">
                    Simpan
                </button>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/layout.js"></script>
<script src="js/profile.js"></script>

</body>
</html>
