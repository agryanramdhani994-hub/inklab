<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Detail Produk - INKLAB</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container py-5">

    <div class="row">

        <!-- FOTO -->

        <div class="col-lg-6">

            <div class="product-image rounded-4">

                <img
                    id="detailImage"
                    src=""
                    alt=""
                    style="width:100%; height:100%; object-fit:cover; border-radius:20px;">
            
            </div>

        </div>

        <!-- DETAIL -->

        <div class="col-lg-6">

            <h2

            class="fw-bold"
            id="detailNama">

            </h2>

            <div
            id="detailRating"
            class="mb-3">

            <span class="text-warning fs-5">
                ★★★★★
            </span>

            <span class="text-muted">
                (4.9 / 5)
            </span>

        </div>

            <h3

            class="text-primary fw-bold mb-4"
            id="detailHarga">

            </h3>

            <div
                id="detailFitur"
                class="border rounded-3 p-3 mb-4 bg-light">

            </div>

            <p id="detailDeskripsi"></p>

            <hr>

            <div class="mb-4">

                <label class="form-label fw-bold">
            
                    Jumlah
            
                </label>
            
                <div
                    class="d-flex align-items-center"
                    style="width:170px;">
            
                    <button
                        class="btn btn-outline-secondary"
                        onclick="kurangJumlah()">
            
                        -
            
                    </button>
            
                    <input
                        id="jumlah"
                        type="number"
                        value="1"
                        min="1"
                        class="form-control text-center mx-2">
            
                    <button
                        class="btn btn-outline-secondary"
                        onclick="tambahJumlah()">
            
                        +
            
                    </button>
            
                </div>
            
            </div>

            <div class="d-grid gap-3">

                <button
                    class="btn btn-warning btn-lg"
                    onclick="beliSekarang()">

                    <i class="bi bi-lightning-fill"></i>

                    Beli Sekarang

                </button>

                <button 
                    class="btn btn-primary btn-lg"
                    onclick="tambahKeKeranjang()">

                    <i class="bi bi-cart-plus"></i>

                    Tambah ke Keranjang

                </button>

                <button
                    class="btn btn-success btn-lg"
                    onclick="orderWA()">

                    <i class="bi bi-whatsapp"></i>

                    Konsultasi via WhatsApp

                    <div class="card mt-4 border-0 shadow-sm">

                        <div class="card-body">
                    
                            <h5 class="fw-bold mb-3">
                    
                                Mengapa Memilih INKLAB?
                    
                            </h5>
                    
                            <p>
                    
                                ✅ Gratis Design
                    
                            </p>
                    
                            <p>
                    
                                ✅ Bahan Premium
                    
                            </p>
                    
                            <p>
                    
                                ✅ Bisa Custom Sesuai Keinginan
                    
                            </p>
                    
                            <p class="mb-0">
                    
                                ✅ Estimasi Pengerjaan Cepat
                    
                            </p>
                    
                        </div>
                    
                    </div>

                </button>

            </div>

        </div>

    </div>

</div>

<script>

function orderWA(){

const nomor="6289662394806";

const pesan=
"Halo INKLAB, saya ingin memesan Plakat Vandel Kayu Murah Minimalis.";

window.open(

`https://wa.me/${nomor}?text=${encodeURIComponent(pesan)}`,

"_blank"

);

}

</script>

<script src="js/detail-produk.js"></script>

</body>

</html>
